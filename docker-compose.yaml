services:
  mongodb:
    container_name: ms_chats_mongodb
    image: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ms_chats
  mysql:
    image: mysql:8
    container_name: ms_users_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ms_users
      MYSQL_PASSWORD: ms_users
      MYSQL_USER: ms_users
      MYSQL_DATABASE: ms_users